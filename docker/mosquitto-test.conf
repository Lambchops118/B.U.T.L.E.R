# TEST-ONLY Mosquitto configuration for awareness integration tests and the
# simulator while developing off-LAN. This is NOT a second production broker:
# production always uses the existing Raspberry Pi Mosquitto (DISCOVERY.md §14,
# owner-approved). Anonymous access is acceptable only because the compose
# file binds this listener to 127.0.0.1.
listener 1883
allow_anonymous true
persistence false
