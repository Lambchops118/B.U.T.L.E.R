# Alembic configuration for the awareness subsystem.
# Run from the repo root, e.g.:
#   .venv-awareness/bin/alembic -c talos/awareness/alembic.ini upgrade head
# or use the wrapper:
#   .venv-awareness/bin/python -m talos.awareness migrate

[alembic]
script_location = %(here)s/db/migrations
prepend_sys_path = %(here)s/../..
# sqlalchemy.url is intentionally unset: env.py builds it from the awareness
# settings (.env), unless a test overrides the main option programmatically.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
